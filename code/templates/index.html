<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Motor Monitoring</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; text-align: center; padding: 50px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .btn { padding: 10px 20px; margin: 10px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; color: white; }
        .btn-start { background-color: #28a745; }
        .btn-stop { background-color: #dc3545; }
        .btn-pump { background-color: #007bff; }
        #status-box { margin-top: 20px; padding: 15px; border-radius: 5px; background: #333; min-height: 50px; font-size: 18px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎙️ Smart Motor Monitor</h1>
        <p>ESP32 WebSocket Audio Analyzer</p>
        
        <div style="margin: 15px 0; padding: 10px; background: #2a2a2a; border-radius: 8px; font-size: 16px;">
            ESP32 Connection: <span id="esp-status" style="font-weight: bold; color: #dc3545;">Disconnected ❌</span>
        </div>
        
        <div>
            <button class="btn btn-start" onclick="controlRecording('start')">Start Recording</button>
            <button class="btn btn-stop" onclick="controlRecording('stop')">Stop Recording</button>
        </div>
        
        <div>
            <button class="btn btn-pump" onclick="controlPump('on')">Turn Pump ON</button>
            <button class="btn btn-pump" onclick="controlPump('off')">Turn Pump OFF</button>
        </div>

        <div style="margin-top: 20px; padding: 15px; border-top: 1px solid #444;">
            <h3>Upload Audio File for Analysis</h3>
            <input type="file" id="audioUpload" accept=".wav,.mp3" style="margin-bottom: 10px;">
            <br>
            <button class="btn btn-pump" onclick="uploadAudio()">Analyze Uploaded File</button>
        </div>

        <div id="status-box">Waiting for analysis...</div>
    </div>

    <script>
        async function controlRecording(action) {
            await fetch(`/api/record/${action}`, { method: 'POST' });
        }
        
        async function controlPump(action) {
            await fetch(`/api/pump/${action}`, { method: 'POST' });
        }

        async function uploadAudio() {
            const fileInput = document.getElementById('audioUpload');
            if (fileInput.files.length === 0) {
                alert("Please select an audio file first!");
                return;
            }
            
            document.getElementById('status-box').innerHTML = "Uploading and analyzing...";
            
            const formData = new FormData();
            formData.append("file", fileInput.files[0]);
            
            try {
                const res = await fetch('/api/predict-audio', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                let color = "white";
                if (data.prediction === 1) color = "red";
                else if (data.prediction === 0) color = "green";
                
                document.getElementById('status-box').innerHTML = `<b>Upload Analysis:</b> <span style="color:${color}">${data.message}</span>`;
            } catch (e) {
                document.getElementById('status-box').innerHTML = "Error analyzing uploaded file.";
            }
        }

        setInterval(async () => {
            try {
                // Update AI status
                let res = await fetch('/api/status');
                let data = await res.json();
                if (data.message) {
                    document.getElementById('status-box').innerHTML = data.message;
                }
                
                // Update ESP32 connection status
                let resInfo = await fetch('/api/info');
                let dataInfo = await resInfo.json();
                const espStatusEl = document.getElementById('esp-status');
                if (dataInfo.esp32_connected) {
                    const devName = dataInfo.device_name || "device-1";
                    espStatusEl.innerHTML = `${devName} Connected ✅`;
                    espStatusEl.style.color = "#28a745";
                } else {
                    espStatusEl.innerHTML = "Disconnected ❌";
                    espStatusEl.style.color = "#dc3545";
                }
            } catch (e) {}
        }, 1000);
    </script>
</body>
</html>
